<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
      
      .logo-glitch {
   
      }
      

      .logo-glitch img {
          width: 400px;
          height: 300px;
          position: absolute;
        text-align: center;
 
        /*Create overlap*/
        
        margin: 0;
        line-height: 0;
        /*Animation*/
        
        animation: glitch1 2.5s infinite;
      }
      
      .logo-glitch img:nth-child(2) {
    
        animation: glitch2 2.5s infinite;
      }
      
      .logo-glitch img:nth-child(3) {
 
        animation: glitch3 2.5s infinite;
      }
      /*Keyframes*/
      
      @keyframes glitch1 {
        
        0% {
          transform: none;
         
        }
        7% {
          transform: translate(2px, 3px);
        
        }
        10% {
          transform: none;
        
        }
        27% {
          transform: none;
        
        }
        30% {
          transform: translate(5px, 2px);
      
        }
        35% {
          transform: none;
    
        }
        52% {
          transform: none;
     
        }
        55% {
          transform: translate(5px, 1px);
        
        }
        50% {
          transform: none;
         
        }
        72% {
          transform: none;
     
        }
        75% {
          transform: translate(2px, 6px);
       
        }
        80% {
          transform: none;
     
        }
        100% {
          transform: none;
         
        }
      }
      
      @keyframes glitch2 {
        0% {
          transform: none;
          opacity: 1;
        }
        7% {
            transform: none;
          opacity: 1;
        }
        10% {
            transform: translate(-2px, -3px);
          opacity: 1;
        }
        27% {
          transform: none;
          opacity: 1;
        }
        30% {
          transform: translate(-5px, -2px);
          opacity: 1;
        }
        35% {
          transform: none;
          opacity: 1;
        }
        52% {
          transform: none;
        
        }
        55% {
          transform: translate(-5px, -1px);
          
        }
        50% {
          transform: none;
        
        }
        72% {
          transform: none;
          
        }
        75% {
          transform: translate(-2px, -6px);
         
        }
        80% {
          transform: none;
          
        }
        100% {
          transform: none;
         
        }
      }
      
      @keyframes glitch3 {
 
        35% {
          transform: none;
          opacity: 1;
        }
        52% {
          transform: none;
          opacity: 1;
        }
        55% {
            transform: none;
          opacity: 1;
        }
        50% {
          transform: none;
          opacity: 1;
        }
        72% {
          transform: none;
          opacity: 1;
        }
        75% {
            transform: none;
          opacity: 1;
        }
        80% {
          transform: none;
          opacity: 1;
        }
        100% {
          transform: none;
          opacity: 1;
        }
      }</style>   
    




    <div class="logo-glitch">
        <img  src="./img/svg/vmv-r.svg">
        <img  src="./img/svg/vmv-b.svg">
        <img  src="./img/svg/vmv.svg">
      </div>


    
    
 

</body>
</html>
