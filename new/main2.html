  .logo-glitch img {

    /*Animation*/

  }
  /*Keyframes*/
  
  @keyframes glitch1 {
    
    0% {
      transform: none;
     
    }
    7% {
      transform: translate(2px, 3px);
    
    }
    10% {
      transform: none;
    
    }
    27% {

    }
    30% {

      transform: none;

    72% {
      transform: none;
 
    }
    75% {

    }
    80% {
      transform: none;
 
    }
    100% {
      transform: none;
     
    }
  }

    <svg style="position: fixed;">
      <filter id="glitch">
     
        <feOffset in="red" result="red" dx="-15">
          <animate attributeName="dx" attributeType="XML" values="0; -3; 1; 0; 2; -1; 0;" dur="1s" repeatCount="indefinite"/>
        </feOffset>
        <feOffset in="green" result="green" dx="-10">
          <animate attributeName="dx" attributeType="XML" values="0; 2; -1; 1; 0; 1; 0;" dur="1s" repeatCount="indefinite"/>
        </feOffset>
        <feOffset in="blue" result="blue" dx="-5">
          <animate attributeName="dx" attributeType="XML" values="0; 1; 2; -4; 2; 6; 0;" dur="1s" repeatCount="indefinite"/>
        </feOffset>
        
        <feBlend in="red" in2="green" mode="screen" result="blend" />
        <feBlend in="blend" in2="blue" mode="screen" result="blend" />
      <feGaussianBlur in="blend" stdDeviation="1">
        <animate attributeName="stdDeviation" attributeType="XML" values="0; 2; 1; 0.3; 2; 1; 0.5 ;3; 0" dur="5s" repeatCount="indefinite"/>
      </feGaussianBlur>
      </filter>
    </svg>
